services:
  - type: web
    name: vequil-recon-engine
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.vequil.server
    envVars:
      - key: DASHBOARD_API_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: PORT
        value: 10000
